                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-8 md:p-12 pt-6 border-t border-white/5 shrink-0 bg-[#0f172a] text-center">
                                        <p className="text-xs text-gray-500 mb-6 italic font-medium">{t.disclaimer}</p>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <button 
                                                onClick={() => copyToClipboard(selectedRule.details[lang].join('\n'))}
                                                className="flex-1 bg-white/10 hover:bg-white/20 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all flex items-center justify-center gap-3"
                                            >
                                                <i data-lucide={copied ? "check" : "copy"} className={`w-5 h-5 ${copied ? "text-green-500" : ""}`}></i>
                                                {copied ? t.copied : t.copy}
                                            </button>
                                            <button onClick={() => setSelectedRule(null)} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20">
                                                {t.close}
                                            </button>
                                        </div>
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    <footer className="max-w-6xl mx-auto px-4 py-16 text-center border-t border-white/5 mt-12">
                        <p className="text-xs text-gray-600 font-black uppercase tracking-[0.3em]">{t.copyright}</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Lucide ikonlarını render sonrası çalıştır
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
