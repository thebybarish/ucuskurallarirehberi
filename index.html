    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; }
        * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }
        .airline-card { cursor: pointer; transition: transform 0.2s ease; }
        .airline-card:hover { transform: translateY(-2px); }
        #modal { display: none; }
        #modal.active { display: flex; }
        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .copy-toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .copy-toast.active { display: block; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0a0a0a', darkCard: '#151515' } } }

            { id: 39, tr: { title: "AJET BASIC (DIŞ HAT)", details: ["Öncesi değişim: 75 USD/EUR.", "İade yok."] }, en: { title: "AJET BASIC (INTL)", details: ["Pre-flight change: 75 USD/EUR.", "No refund."] } },
            { id: 40, tr: { title: "AJET EKOJET (DIŞ HAT)", details: ["Öncesi değişim: 55 USD.", "İade yok."] }, en: { title: "AJET EKOJET (INTL)", details: ["Pre-flight change: 55 USD.", "No refund."] } },
            { id: 41, tr: { title: "AJET FLEX (DIŞ HAT)", details: ["Öncesi değişim: 35 USD.", "2 saat+ iade: 95 USD."] }, en: { title: "AJET FLEX (INTL)", details: ["Pre-flight change: 35 USD.", "2h+ refund: 95 USD."] } },
            { id: 42, tr: { title: "AJET PREMIUM (DIŞ HAT)", details: ["Öncesi cezasız değişim.", "İade cezası yok."] }, en: { title: "AJET PREMIUM (INTL)", details: ["Pre-flight free change.", "No refund penalty."] } },
            { id: 43, tr: { title: "PEGASUS DIŞ HAT (G/P)", details: ["Değişiklik yok.", "İade yok."] }, en: { title: "PEGASUS INTL (G/P)", details: ["No changes.", "No refunds."] } },
            { id: 44, tr: { title: "PEGASUS DIŞ HAT (U)", details: ["2 saat+ değişim: 40 EUR.", "İade yok."] }, en: { title: "PEGASUS INTL (U)", details: ["2h+ change: 40 EUR.", "No refund."] } },
            { id: 45, tr: { title: "PEGASUS DIŞ HAT (T)", details: ["2 saat+ değişim: 55 EUR.", "İade yok."] }, en: { title: "PEGASUS INTL (T)", details: ["2h+ change: 55 EUR.", "No refund."] } },
            { id: 46, tr: { title: "PEGASUS DIŞ HAT (Z/V/X/S)", details: ["2 saat+ değişim: 80 EUR.", "12 saat+ iade: 95 EUR."] }, en: { title: "PEGASUS INTL (Z/V/X/S)", details: ["2h+ change: 80 EUR.", "12h+ refund: 95 EUR."] } },
            { id: 47, tr: { title: "PEGASUS DIŞ HAT (N/K)", details: ["2 saat+ değişim: 95 EUR.", "12 saat+ iade: 110 EUR."] }, en: { title: "PEGASUS INTL (N/K)", details: ["2h+ change: 95 EUR.", "12h+ refund: 110 EUR."] } },
            { id: 48, tr: { title: "PEGASUS DIŞ HAT (H)", details: ["2 saat+ değişim: 110 EUR.", "12 saat+ iade: 140 EUR."] }, en: { title: "PEGASUS INTL (H)", details: ["2h+ change: 110 EUR.", "12h+ refund: 140 EUR."] } },
            { id: 49, tr: { title: "PEGASUS DIŞ HAT (M)", details: ["2 saat+ değişim: 130 EUR.", "12 saat+ iade: 165 EUR."] }, en: { title: "PEGASUS INTL (M)", details: ["2h+ change: 130 EUR.", "12h+ refund: 165 EUR."] } },
            { id: 50, tr: { title: "PEGASUS DIŞ HAT (L)", details: ["2 saat+ değişim: 145 EUR.", "12 saat+ iade: 165 EUR."] }, en: { title: "PEGASUS INTL (L)", details: ["2h+ change: 145 EUR.", "12h+ refund: 165 EUR."] } },
            { id: 51, tr: { title: "PEGASUS DIŞ HAT (B)", details: ["2 saat+ değişim: 165 EUR.", "12 saat+ iade: 190 EUR."] }, en: { title: "PEGASUS INTL (B)", details: ["2h+ change: 165 EUR.", "12h+ refund: 190 EUR."] } },
            { id: 52, tr: { title: "PEGASUS DIŞ HAT (Y)", details: ["2 saat+ değişim: 230 EUR.", "12 saat+ iade: 265 EUR."] }, en: { title: "PEGASUS INTL (Y)", details: ["2h+ change: 230 EUR.", "12h+ refund: 265 EUR."] } }
        ];

        let isDarkMode = false;
        let currentLang = 'tr';
        let currentSelectedRule = null;

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            updateUI();
            renderRules();
            if (currentSelectedRule) openModal(currentSelectedRule);
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('stat-1-label').innerText = t.stat1;
            document.getElementById('stat-1-val').innerText = t.stat1Val;
            document.getElementById('stat-2-label').innerText = t.stat2;
            document.getElementById('stat-2-val').innerText = t.stat2Val;
            document.getElementById('stat-3-label').innerText = t.stat3;
            document.getElementById('stat-3-val').innerText = t.stat3Val;
            document.getElementById('langBtn').innerText = currentLang === 'tr' ? 'EN' : 'TR';
            document.getElementById('langBtnMobile').innerText = currentLang === 'tr' ? 'EN' : 'TR';
            document.getElementById('modalCloseBtn').innerText = t.close;
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark');
            const icon = isDarkMode ? '☀️' : '🌙';
            document.getElementById('themeBtn').innerText = icon;
            document.getElementById('themeBtnMobile').innerText = icon;
        }

        function getAirlineInfo(title) {
            if (title.includes('THY') || title.includes('TÜRK')) return { name: 'THY', color: 'border-red-200 text-red-700 bg-red-50 dark:bg-red-900/20' };
            if (title.includes('AJET')) return { name: 'AJet', color: 'border-blue-200 text-blue-700 bg-blue-50 dark:bg-blue-900/20' };
            if (title.includes('PEGASUS')) return { name: 'Pegasus', color: 'border-yellow-300 text-yellow-800 bg-yellow-50 dark:bg-yellow-900/20' };
            return { name: 'SunEx', color: 'border-orange-200 text-orange-700 bg-orange-50 dark:bg-orange-950/20' };
        }

        function renderRules() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            const filtered = flightRules.filter(r => r[currentLang].title.toLowerCase().includes(search));
            filtered.forEach(rule => {
                const data = rule[currentLang];
                const info = getAirlineInfo(data.title);
                const btn = document.createElement('button');
                btn.className = 'airline-card w-full bg-white dark:bg-darkCard border border-black/5 dark:border-white/5 rounded-2xl p-4 flex items-center justify-between group text-left';
                btn.onclick = () => openModal(rule);
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl border flex items-center justify-center font-bold text-[10px] ${info.color}">${info.name}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500">#${rule.id}</span>
                                <span class="text-[10px] font-bold text-blue-500 uppercase">${info.name}</span>
                            </div>
                            <h3 class="font-medium text-sm md:text-base">${data.title}</h3>
                        </div>
                    </div>
                    <span class="text-gray-300 dark:text-gray-600 group-hover:text-blue-500 transition-all">➔</span>
                `;
                list.appendChild(btn);
            });
        }

        function openModal(rule) {
            currentSelectedRule = rule;
            const data = rule[currentLang];
            const info = getAirlineInfo(data.title);
            document.getElementById('modalHeaderContent').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-2xl border flex items-center justify-center font-bold text-[11px] ${info.color}">${info.name}</div>
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 uppercase">${translations[currentLang].detail} #${rule.id}</span>
                        <h2 class="text-xl md:text-2xl font-bold leading-tight">${data.title}</h2>
                    </div>
                </div>
            `;
            document.getElementById('modalBody').innerHTML = `
                <div class="space-y-4">
                    ${data.details.map(d => `
                        <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border border-black/5 dark:border-white/5">
                            <div class="mt-2 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div>
                            <p class="text-sm md:text-base font-medium">${d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            document.getElementById('copyBtn').onclick = () => {
                const text = `${data.title}\n\n${data.details.join('\n')}`;
                navigator.clipboard.writeText(text).then(() => {
                    const toast = document.getElementById('copyToast');
                    toast.classList.add('active');
                    setTimeout(() => toast.classList.remove('active'), 2000);
                });
            };
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            currentSelectedRule = null;
        }

        updateUI();
        renderRules();
    </script>
</body>
</html>
