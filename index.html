<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Kuralları Rehberi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; }
        /* Geçiş yumuşatma */
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .airline-card { cursor: pointer; }
        .airline-card:hover { transform: translateY(-2px); }
        #modal { display: none; }
        #modal.active { display: flex; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0a0a0a', darkCard: '#151515' }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f5f5f5] dark:bg-darkBg text-[#1a1a1a] dark:text-[#f5f5f5]">
    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-black/5 dark:border-white/10 px-4 py-4 md:px-8">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">Uçuş Kuralları</h1>
                        <p class="text-[10px] text-gray-500 dark:text-gray-400 uppercase tracking-widest">Bilet Rehberi</p>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 md:hidden" id="themeBtnMobile">🌙</button>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="searchInput" oninput="renderRules()" placeholder="Havayolu veya kural ara..." class="w-full md:w-80 bg-gray-100 dark:bg-gray-800 rounded-2xl py-2.5 px-4 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 dark:text-white">
                <button onclick="toggleDarkMode()" class="hidden md:block p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800" id="themeBtn">🌙</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white dark:bg-darkCard p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">Güncel Veri</p>
                <p class="text-2xl font-light">52 Farklı Sınıf</p>
            </div>
            <div class="bg-white dark:bg-darkCard p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">Zaman Bazlı</p>
                <p class="text-2xl font-light">Esnek Kurallar</p>
            </div>
            <div class="bg-white dark:bg-darkCard p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">İade & Değişim</p>
                <p class="text-2xl font-light">Net Ücretler</p>
            </div>
        </div>

        <!-- Rules List -->
        <div id="rulesList" class="space-y-3"></div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="relative bg-white dark:bg-darkCard w-full max-w-2xl rounded-[32px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-black/5 dark:border-white/10">
            <div class="p-6 md:p-10 border-b border-gray-100 dark:border-white/5">
                <div class="flex justify-between items-start">
                    <div id="modalHeaderContent"></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 md:p-10" id="modalBody"></div>
            <div class="p-6 md:p-10 border-t border-gray-100 dark:border-white/5">
                <button onclick="closeModal()" class="w-full bg-black dark:bg-white text-white dark:text-black py-4 rounded-2xl font-bold">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        const flightRules = [
            { id: 1, title: "THY ECO FLY (U/W/P/V/L/T)", details: ["Değişiklik yapılamaz.", "İadeye izin verilmez.", "Bagaj: 15KG"] },
            { id: 2, title: "THY ECO FLY (Q)", details: ["12 saat+ değişim: 1100 TL.", "1-12 saat değişim: 1350 TL.", "İade yok."] },
            { id: 3, title: "THY ECO FLY (E)", details: ["12 saat+ değişim: 1100 TL.", "12 saat+ iade: 1450 TL."] },
            { id: 4, title: "THY ECO FLY (O/S/H/A/M/B)", details: ["12 saat+ değişim: 1100 TL.", "12 saat+ iade: 1450 TL."] },
            { id: 5, title: "THY EXTRA FLY (P/V)", details: ["12 saat+ değişim: 350 TL.", "1-12 saat değişim: 600 TL.", "12 saat+ iade: 650 TL."] },
            { id: 6, title: "THY EXTRA FLY (L/T/Q/E/O/S/H/A/M/B)", details: ["12 saat+ değişim: 350 TL.", "1-12 saat iade: 950 TL."] },
            { id: 7, title: "THY PRIME FLY", details: ["1 saat+ cezasız değişim.", "12 saat+ cezasız iade.", "1-12 saat iade: 850 TL."] },
            { id: 8, title: "THY BUSINESS", details: ["12 saat+ cezasız değişim.", "1-12 saat iade: 3500 TL."] },
            { id: 16, title: "AJET BASIC (V/P/W/U/5/6/7/8/9)", details: ["Değişiklik yapılamaz.", "İade yok.", "Bagaj: 15KG"] },
            { id: 27, title: "PEGASUS İÇ HAT (G/P/U/T/Z/N/X/S/N)", details: ["2 saat+ değişim: 600 TL.", "İade yok."] },
            { id: 28, title: "PEGASUS İÇ HAT (K/H/M/L/B/Y)", details: ["2 saat+ değişim: 950 TL.", "12 saat+ iade: 1100 TL."] },
            { id: 29, title: "SUNEXPRESS SUNVALUE (İÇ HAT)", details: ["24 saat+ değişim: 500 TL.", "12 saat+ iade: 900 TL."] }
            // ... (Diğer kuralları buraya ekleyebilirsiniz)
        ];

        let isDarkMode = false;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            const html = document.documentElement;
            if (isDarkMode) {
                html.classList.add('dark');
                document.getElementById('themeBtn').innerText = '☀️';
                document.getElementById('themeBtnMobile').innerText = '☀️';
            } else {
                html.classList.remove('dark');
                document.getElementById('themeBtn').innerText = '🌙';
                document.getElementById('themeBtnMobile').innerText = '🌙';
            }
        }

        function getAirlineInfo(title) {
            if (title.includes('THY')) return { name: 'THY', color: 'border-red-200 text-red-700 bg-red-50 dark:bg-red-900/20' };
            if (title.includes('AJET')) return { name: 'AJet', color: 'border-blue-200 text-blue-700 bg-blue-50 dark:bg-blue-900/20' };
            if (title.includes('PEGASUS')) return { name: 'Pegasus', color: 'border-yellow-300 text-yellow-800 bg-yellow-50 dark:bg-yellow-900/20' };
            return { name: 'SunEx', color: 'border-orange-200 text-orange-700 bg-orange-50 dark:bg-orange-950/20' };
        }

        function renderRules() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            const filtered = flightRules.filter(r => r.title.toLowerCase().includes(search));
            filtered.forEach(rule => {
                const info = getAirlineInfo(rule.title);
                const btn = document.createElement('button');
                btn.className = 'airline-card w-full bg-white dark:bg-darkCard border border-black/5 dark:border-white/5 rounded-2xl p-4 flex items-center justify-between group text-left';
                btn.onclick = () => openModal(rule);
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl border flex items-center justify-center font-bold text-[10px] ${info.color}">${info.name}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500">#${rule.id}</span>
                                <span class="text-[10px] font-bold text-blue-500 uppercase">${info.name}</span>
                            </div>
                            <h3 class="font-medium text-sm md:text-base">${rule.title}</h3>
                        </div>
                    </div>
                    <span class="text-gray-300 dark:text-gray-600 group-hover:text-blue-500 transition-all">➔</span>
                `;
                list.appendChild(btn);
            });
        }

        function openModal(rule) {
            const info = getAirlineInfo(rule.title);
            document.getElementById('modalHeaderContent').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-2xl border flex items-center justify-center font-bold text-[11px] ${info.color}">${info.name}</div>
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 uppercase">Kural Detayı #${rule.id}</span>
                        <h2 class="text-xl md:text-2xl font-bold leading-tight">${rule.title}</h2>
                    </div>
                </div>
            `;
            document.getElementById('modalBody').innerHTML = `
                <div class="space-y-4">
                    ${rule.details.map(d => `
                        <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border border-black/5 dark:border-white/5">
                            <div class="mt-2 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div>
                            <p class="text-sm md:text-base font-medium">${d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        renderRules();
    </script>
</body>
</html>
