<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Kuralları Rehberi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; }
        .dark { background-color: #0a0a0a; color: #f5f5f5; }
        .airline-card { transition: all 0.2s ease; cursor: pointer; }
        .airline-card:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.5); }
        #modal { display: none; }
        #modal.active { display: flex; }
        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f5f5f5] transition-colors duration-300">
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-black/5 px-4 py-4 md:px-8">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">Uçuş Kuralları</h1>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Bilet Rehberi</p>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-gray-100 md:hidden" id="themeBtnMobile">🌙</button>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="searchInput" oninput="renderRules()" placeholder="Havayolu veya kural ara..." class="w-full md:w-80 bg-gray-100 rounded-2xl py-2.5 px-4 text-sm outline-none focus:ring-2 focus:ring-blue-500/20">
                <button onclick="toggleDarkMode()" class="hidden md:block p-2.5 rounded-xl bg-gray-100" id="themeBtn">🌙</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white dark:bg-gray-900 p-5 rounded-3xl border border-black/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">Güncel Veri</p>
                <p class="text-2xl font-light">52 Farklı Sınıf</p>
            </div>
            <div class="bg-white dark:bg-gray-900 p-5 rounded-3xl border border-black/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">Zaman Bazlı</p>
                <p class="text-2xl font-light">Esnek Kurallar</p>
            </div>
            <div class="bg-white dark:bg-gray-900 p-5 rounded-3xl border border-black/5 shadow-sm">
                <p class="text-sm font-semibold text-gray-400 mb-1">İade & Değişim</p>
                <p class="text-2xl font-light">Net Ücretler</p>
            </div>
        </div>
        <div id="rulesList" class="space-y-3"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div class="modal-content relative bg-white dark:bg-gray-900 w-full max-w-2xl rounded-[32px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-6 md:p-10 border-b border-gray-100 dark:border-white/5">
                <div class="flex justify-between items-start">
                    <div id="modalHeaderContent"></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 md:p-10" id="modalBody"></div>
            <div class="p-6 md:p-10 border-t border-gray-100 dark:border-white/5">
                <button onclick="closeModal()" class="w-full bg-black dark:bg-white text-white dark:text-black py-4 rounded-2xl font-bold">Anladım, Kapat</button>
            </div>
        </div>
    </div>

    <script>

            { id: 6, title: "THY EXTRA FLY (L/T/Q/E/O/S/H/A/M/B)", details: ["12 saat+ değişim: 350 TL.", "1-12 saat iade: 950 TL."] },

            { id: 17, title: "AJET BASIC (Y/B/M/A/H/S/O/E/Q/T/L/1/2/3/4)", details: ["1-12 saat+ değişim: 950 TL.", "12 saat+ iade: 1100 TL."] },
            { id: 18, title: "AJET FLEX (V/P/W/U/5/6/7/8/9)", details: ["12 saat+ değişim: 400 TL.", "İade yok.", "Bagaj: 20KG"] },
            { id: 19, title: "AJET FLEX (Y/B/M/A/H/S/O/E/Q/T/L/1/2/3/4)", details: ["12 saat+ değişim: 750 TL.", "12 saat+ iade: 900 TL."] },
            { id: 20, title: "AJET PREMIUM İÇ HAT (V/P/W/U/5/6/7/8/9)", details: ["1 saat+ cezasız değişim.", "12 saat+ cezasız iade."] },
            { id: 21, title: "AJET PREMIUM İÇ HAT (Y/B/M/A/H/S/O/E/Q/T/L/1/2/3/4)", details: ["1 saat+ cezasız değişim.", "12 saat+ cezasız iade."] },

            { id: 26, title: "AJET PREMIUM (ERCAN)", details: ["Cezasız değişim.", "12 saat+ iade: 150 TL."] },
            { id: 27, title: "PEGASUS İÇ HAT (G/P/U/T/Z/N/X/S/N)", details: ["2 saat+ değişim: 600 TL.", "İade yok."] },
            { id: 28, title: "PEGASUS İÇ HAT (K/H/M/L/B/Y)", details: ["2 saat+ değişim: 950 TL.", "12 saat+ iade: 1100 TL."] },

            { id: 30, title: "SUNEXPRESS SUNECO+ (İÇ HAT)", details: ["2 saat+ cezasız değişim.", "6 saat+ cezasız iade."] },
            { id: 31, title: "SUNEXPRESS SUNCOMFORT (İÇ HAT)", details: ["24 saat+ değişim: 500 TL.", "12 saat+ iade: 900 TL."] },
            { id: 32, title: "PEGASUS KKTC (U/G/P/T/Z/V/X/S)", details: ["2 saat+ değişim: 25 EUR.", "İade yok."] },
            { id: 33, title: "PEGASUS KKTC (N/K)", details: ["2 saat+ değişim: 40 EUR.", "12 saat+ iade: 40 EUR."] },
            { id: 34, title: "PEGASUS KKTC (H)", details: ["2 saat+ değişim: 50 EUR.", "12 saat+ iade: 50 EUR."] },

            { id: 36, title: "PEGASUS KKTC (L)", details: ["2 saat+ değişim: 70 EUR.", "12 saat+ iade: 70 EUR."] },
            { id: 37, title: "PEGASUS KKTC (B)", details: ["2 saat+ değişim: 80 EUR.", "12 saat+ iade: 80 EUR."] },
            { id: 38, title: "PEGASUS KKTC (Y)", details: ["2 saat+ değişim: 90 EUR.", "12 saat+ iade: 90 EUR."] },
            { id: 39, title: "AJET BASIC (DIŞ HAT)", details: ["Öncesi değişim: 75 USD/EUR.", "İade yok."] },
            { id: 40, title: "AJET EKOJET (DIŞ HAT)", details: ["Öncesi değişim: 55 USD.", "İade yok."] },
            { id: 41, title: "AJET FLEX (DIŞ HAT)", details: ["Öncesi değişim: 35 USD.", "2 saat+ iade: 95 USD."] },
            { id: 42, title: "AJET PREMIUM (DIŞ HAT)", details: ["Öncesi cezasız değişim.", "İade cezası yok."] },
            { id: 43, title: "PEGASUS DIŞ HAT (G/P)", details: ["Değişiklik yok.", "İade yok."] },
            { id: 44, title: "PEGASUS DIŞ HAT (U)", details: ["2 saat+ değişim: 40 EUR.", "İade yok."] },
            { id: 45, title: "PEGASUS DIŞ HAT (T)", details: ["2 saat+ değişim: 55 EUR.", "İade yok."] },
            { id: 46, title: "PEGASUS DIŞ HAT (Z/V/X/S)", details: ["2 saat+ değişim: 80 EUR.", "12 saat+ iade: 95 EUR."] },
            { id: 47, title: "PEGASUS DIŞ HAT (N/K)", details: ["2 saat+ değişim: 95 EUR.", "12 saat+ iade: 110 EUR."] },
            { id: 48, title: "PEGASUS DIŞ HAT (H)", details: ["2 saat+ değişim: 110 EUR.", "12 saat+ iade: 140 EUR."] },
            { id: 49, title: "PEGASUS DIŞ HAT (M)", details: ["2 saat+ değişim: 130 EUR.", "12 saat+ iade: 165 EUR."] },
            { id: 50, title: "PEGASUS DIŞ HAT (L)", details: ["2 saat+ değişim: 145 EUR.", "12 saat+ iade: 165 EUR."] },
            { id: 51, title: "PEGASUS DIŞ HAT (B)", details: ["2 saat+ değişim: 165 EUR.", "12 saat+ iade: 190 EUR."] },
            { id: 52, title: "PEGASUS DIŞ HAT (Y)", details: ["2 saat+ değişim: 230 EUR.", "12 saat+ iade: 265 EUR."] }
        ];

        let isDarkMode = false;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark');
            document.getElementById('themeBtn').innerText = isDarkMode ? '☀️' : '🌙';
            document.getElementById('themeBtnMobile').innerText = isDarkMode ? '☀️' : '🌙';
        }

        function getAirlineInfo(title) {
            if (title.includes('THY')) return { name: 'THY', color: 'border-red-200 text-red-700 bg-red-50 dark:bg-red-900/20' };
            if (title.includes('AJET')) return { name: 'AJet', color: 'border-blue-200 text-blue-700 bg-blue-50 dark:bg-blue-900/20' };
            if (title.includes('PEGASUS')) return { name: 'Pegasus', color: 'border-yellow-300 text-yellow-800 bg-yellow-50 dark:bg-yellow-900/20' };
            return { name: 'SunEx', color: 'border-orange-200 text-orange-700 bg-orange-50 dark:bg-orange-950/20' };
        }

        function renderRules() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            const filtered = flightRules.filter(r => r.title.toLowerCase().includes(search));
            filtered.forEach(rule => {
                const info = getAirlineInfo(rule.title);
                const btn = document.createElement('button');
                btn.className = 'airline-card w-full bg-white dark:bg-gray-900 border border-black/5 rounded-2xl p-4 flex items-center justify-between group text-left';
                btn.onclick = () => openModal(rule);
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl border flex items-center justify-center font-bold text-[10px] ${info.color}">${info.name}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-400">#${rule.id}</span>
                                <span class="text-[10px] font-bold text-blue-500 uppercase">${info.name}</span>
                            </div>
                            <h3 class="font-medium text-sm md:text-base">${rule.title}</h3>
                        </div>
                    </div>
                    <span class="text-gray-300 group-hover:text-blue-500 transition-all">➔</span>
                `;
                list.appendChild(btn);
            });
        }

        function openModal(rule) {
            const info = getAirlineInfo(rule.title);
            document.getElementById('modalHeaderContent').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-2xl border flex items-center justify-center font-bold text-[11px] ${info.color}">${info.name}</div>
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 uppercase">Kural Detayı #${rule.id}</span>
                        <h2 class="text-xl md:text-2xl font-bold leading-tight">${rule.title}</h2>
                    </div>
                </div>
            `;
            document.getElementById('modalBody').innerHTML = `
                <div class="space-y-4">
                    ${rule.details.map(d => `
                        <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border border-black/5">
                            <div class="mt-2 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div>
                            <p class="text-sm md:text-base font-medium">${d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        renderRules();
    </script>
</body>
</html>
