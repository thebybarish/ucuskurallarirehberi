<!DOCTYPE html>
<html lang="tr">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; }
        * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }
        .airline-card { cursor: pointer; transition: transform 0.2s ease; }
        .airline-card:hover { transform: translateY(-2px); }
        #modal { display: none; }
        #modal.active { display: flex; }
        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .copy-toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .copy-toast.active { display: block; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0a0a0a', darkCard: '#151515' } } }

        let isDarkMode = false;
        let currentSelectedRule = null;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            const html = document.documentElement;
            if (isDarkMode) {
                html.classList.add('dark');
                document.getElementById('themeBtn').innerText = '☀️';
                document.getElementById('themeBtnMobile').innerText = '☀️';
            } else {
                html.classList.remove('dark');
                document.getElementById('themeBtn').innerText = '🌙';
                document.getElementById('themeBtnMobile').innerText = '🌙';
            }
        }

        function getAirlineInfo(title) {
            if (title.includes('TÜRK HAVA YOLLARI')) return { name: 'THY', color: 'border-red-200 text-red-700 bg-red-50 dark:bg-red-900/20' };
            if (title.includes('AJET')) return { name: 'AJet', color: 'border-blue-200 text-blue-700 bg-blue-50 dark:bg-blue-900/20' };
            if (title.includes('PEGASUS')) return { name: 'Pegasus', color: 'border-yellow-300 text-yellow-800 bg-yellow-50 dark:bg-yellow-900/20' };
            return { name: 'SunEx', color: 'border-orange-200 text-orange-700 bg-orange-50 dark:bg-orange-950/20' };
        }

        function renderRules() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            const filtered = flightRules.filter(r => r.title.toLowerCase().includes(search));
            filtered.forEach(rule => {
                const info = getAirlineInfo(rule.title);
                const btn = document.createElement('button');
                btn.className = 'airline-card w-full bg-white dark:bg-darkCard border border-black/5 dark:border-white/5 rounded-2xl p-4 flex items-center justify-between group text-left';
                btn.onclick = () => openModal(rule);
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl border flex items-center justify-center font-bold text-[10px] ${info.color}">${info.name}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500">#${rule.id}</span>
                                <span class="text-[10px] font-bold text-blue-500 uppercase">${info.name}</span>
                            </div>
                            <h3 class="font-medium text-sm md:text-base">${rule.title}</h3>
                        </div>
                    </div>
                    <span class="text-gray-300 dark:text-gray-600 group-hover:text-blue-500 transition-all">➔</span>
                `;
                list.appendChild(btn);
            });
        }

        function openModal(rule) {
            currentSelectedRule = rule;
            const info = getAirlineInfo(rule.title);
            document.getElementById('modalHeaderContent').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-2xl border flex items-center justify-center font-bold text-[11px] ${info.color}">${info.name}</div>
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 uppercase">Kural Detayı #${rule.id}</span>
                        <h2 class="text-xl md:text-2xl font-bold leading-tight">${rule.title}</h2>
                    </div>
                </div>
            `;
            document.getElementById('modalBody').innerHTML = `
                <div class="space-y-4">
                    ${rule.details.map(d => `
                        <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border border-black/5 dark:border-white/5">
                            <div class="mt-2 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div>
                            <p class="text-sm md:text-base font-medium">${d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Kopyala butonu olayını bağla
            document.getElementById('copyBtn').onclick = () => {
                const text = `${rule.title}\n\n${rule.details.join('\n')}`;
                navigator.clipboard.writeText(text).then(() => {
                    const toast = document.getElementById('copyToast');
                    toast.classList.add('active');
                    setTimeout(() => toast.classList.remove('active'), 2000);
                });
            };
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        renderRules();
    </script>
