                                    <i data-lucide="chevron-right" className="w-5 h-5 text-gray-300 group-hover:text-blue-500 transition-all"></i>
                                </motion.div>
                            ))}
                        </div>
                    </main>

                    <AnimatePresence>
                        {selectedRule && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setSelectedRule(null)} className="absolute inset-0 bg-black/60 backdrop-blur-sm" />
                                <motion.div layoutId={`rule-${selectedRule.id}`} className="relative bg-white dark:bg-gray-900 w-full max-w-2xl rounded-[32px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
                                    <div className="p-6 md:p-10 pb-6 border-b dark:border-white/5 shrink-0 flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-14 h-14 rounded-2xl border flex items-center justify-center font-bold text-xs text-center px-1 leading-tight ${getAirlineColor(selectedRule.title[lang])}`}>
                                                {getAirlineName(selectedRule.title[lang])}
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{t.ruleDetail}</span>
                                                    <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">#{selectedRule.id}</span>
                                                </div>
                                                <h2 className="text-xl md:text-2xl font-bold leading-tight">{selectedRule.title[lang]}</h2>
                                            </div>
                                        </div>
                                        <button onClick={() => setSelectedRule(null)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                                            <i data-lucide="x" className="w-6 h-6 text-gray-400"></i>
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 md:p-10 pt-6">
                                        <div className="space-y-3">
                                            {selectedRule.details[lang].map((detail, i) => (
                                                <div key={i} className="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border dark:border-white/5">
                                                    <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0" />
                                                    <p className="text-sm md:text-base text-gray-700 dark:text-gray-300 leading-relaxed">{detail}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-6 md:p-10 pt-6 border-t dark:border-white/5 shrink-0 bg-white dark:bg-gray-900 text-center">
                                        <p className="text-xs text-gray-400 mb-4 italic">{t.disclaimer}</p>
                                        <button onClick={() => setSelectedRule(null)} className="w-full bg-black dark:bg-white text-white dark:text-black px-8 py-3 rounded-2xl font-bold text-sm">{t.close}</button>
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    <footer className="max-w-5xl mx-auto px-4 py-12 text-center border-t dark:border-white/5 mt-12">
                        <p className="text-sm text-gray-400 font-medium uppercase tracking-wide">{t.copyright}</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Lucide ikonlarını render sonrası çalıştır
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
